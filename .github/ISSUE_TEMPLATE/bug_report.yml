name: Bug report
description: Something isn't working correctly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to file a bug report.
        Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: gerberdelta version
      placeholder: "e.g. 0.14.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.12.3"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Command(s) and minimal Gerber/Excellon input that trigger the bug.
      placeholder: |
        1. Run `gerberdelta diff before/ after/`
        2. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant output / traceback
      render: text
