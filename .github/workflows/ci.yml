name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --dev
      - run: uv run ruff check gerberdiff/ tests/
      - run: uv run ruff format --check gerberdiff/ tests/
      - name: Check for non-ASCII characters
        run: |
          if grep -rP '[^\x00-\x7F]' gerberdiff/ tests/ *.md *.toml; then
            echo "Non-ASCII characters found"
            exit 1
          fi

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --dev
      - run: uv run mypy gerberdiff/ tests/

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest]
        include:
          - python-version: "3.11"
            os: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - run: uv sync --dev
      - name: Test (with coverage gate)
        if: matrix.os != 'windows-latest'
        run: uv run pytest tests/ --cov=gerberdiff --cov-report=xml --cov-fail-under=90 -q
      - name: Test (Windows, no system cairo -- raster tests skip)
        if: matrix.os == 'windows-latest'
        run: uv run pytest tests/ -q
      - uses: actions/upload-artifact@v7
        if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
